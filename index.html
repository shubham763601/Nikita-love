<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Nikki ❤️</title>

<style>

/* ---------- RESET ---------- */

{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#05051a;
color:white;
overflow-x:hidden;
}

/ ---------- STARRY SKY ---------- /

.stars{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px,transparent 1px),
radial-gradient(white 1px,transparent 1px);
background-size:3px 3px,2px 2px;
opacity:.25;
z-index:-3;
}

/ ---------- HERO SECTION ---------- /

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

.hero h1{
font-size:48px;
background:linear-gradient(90deg,#ff7acb,#8f7bff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:20px;
}

.hero p{
font-size:20px;
opacity:.85;
max-width:600px;
}

/ ---------- POEM ---------- /

.poem{
max-width:700px;
margin:40px auto;
text-align:center;
font-size:22px;
line-height:1.8;
padding:20px;
}

/ ---------- GALLERY ---------- /

.gallery{
display:flex;
justify-content:center;
padding:40px 10px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
max-width:700px;
width:100%;
}

.grid img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.grid img:hover{
transform:scale(1.05);
}

/ ---------- FULLSCREEN VIEWER ---------- /

#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:.4s;
z-index:999;
}

#viewer img{
max-width:90%;
max-height:90%;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,.8);
}

#viewer.active{
opacity:1;
pointer-events:auto;
}

/ ---------- HEART CURSOR ---------- /

.cursor{
position:fixed;
pointer-events:none;
font-size:22px;
z-index:999;
}

/ ---------- FALLING ROSES ---------- /

.rose{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(110vh)}
}

/ ---------- MOBILE RESPONSIVE ---------- /

@media(max-width:700px){
.grid{
grid-template-columns:repeat(4,1fr);
}
}

@media(max-width:500px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="cursor">💖</div>

<section class="hero">

<h1>For Nikki</h1>

<p>Every star in this sky knows your name ✨</p>

</section>

<section class="poem">

<p>Tumhari muskaan meri subah hai.</p>
<p>Jab tum "sona" kehti ho, mera din ban jata hai.</p>
<p>I carry your memories in every heartbeat.</p>
<p>Sona, I really miss you.</p>
<p>Dil karta hai tum bas mere saamne ho ❤️</p>

</section>

<section class="gallery">

<div class="grid">

<img src="assets/236D25F6-ADEB-4DCB-9652-1F690A45B22.png">
<img src="assets/36E6AA0B-0408-4CBF-B657-99179BA7ECF2.png">
<img src="assets/3BE2712B-9DF3-49FF-BDAB-4F3393793AD1.png">
<img src="assets/4E71CD17-7744-4647-BC58-F2CB562CEF0D.png">
<img src="assets/5C59197F-AEB3-418C-ADAD-DFDEB0B13209.png">

<img src="assets/5D1C8109-076E-4C5B-923A-9D881A36C6C8.png">
<img src="assets/7E5D5C0A-9251-4065-B68E-654CBD876457.png">
<img src="assets/8C318060-AB2D-4FB3-BDBC-076BEEB0FB33.png">
<img src="assets/941FD73C-BD49-4E10-B329-95BFF2F31804.png">
<img src="assets/A8EEC203-B3FB-4EEB-AA45-6FAEB012B7BA.png">

</div>

</section>

<div id="viewer">
<img id="viewer-img">
</div>

<script>

/ HEART CURSOR /

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/ FALLING ROSES */

setInterval(()=>{
const rose=document.createElement("div")
rose.className="rose"
rose.innerHTML="🌹"
rose.style.left=Math.random()*100+"%"
rose.style.animationDuration=4+Math.random()5+"s"
document.body.appendChild(rose)
setTimeout(()=>rose.remove(),9000)
},400)

/ IMAGE VIEWER */

const images=document.querySelectorAll(".grid img")
const viewer=document.getElementById("viewer")
const viewerImg=document.getElementById("viewer-img")

images.forEach(img=>{
img.onclick=()=>{
viewer.classList.add("active")
viewerImg.src=img.src
}
})

viewer.onclick=()=>{
viewer.classList.remove("active")
}

</script>

</body>
</html
