<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Nikki ❤️</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#020210;
color:white;
overflow-x:hidden;
cursor:none;
}

/* STAR BACKGROUND /

.stars{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px,transparent 1px),
radial-gradient(white 1px,transparent 1px);
background-size:3px 3px,2px 2px;
opacity:0.25;
z-index:-2;
}

/ HERO /

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
}

.hero h1{
font-size:48px;
background:linear-gradient(90deg,#ff7ad9,#8c7bff);
-webkit-background-clip:text;
color:transparent;
margin:0;
}

.hero p{
font-size:22px;
opacity:.8;
}

/ POEM /

.poem{
max-width:700px;
margin:auto;
text-align:center;
font-size:22px;
line-height:1.8;
padding:60px 20px;
}

/ GALLERY /

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:60px;
}

.gallery img{
width:100%;
border-radius:16px;
transition:.4s;
box-shadow:0 20px 40px rgba(0,0,0,.6);
}

.gallery img:hover{
transform:scale(1.08);
}

/ ROSES /

.rose{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(110vh)}
}

/ HEART CURSOR /

.cursor{
position:fixed;
width:20px;
height:20px;
pointer-events:none;
z-index:999;
font-size:20px;
}

/ SCROLL ANIMATION /

.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="cursor">💖</div>

<section class="hero">

<h1>For Nikki</h1>

<p>Every star in this sky knows your name ✨</p>

</section>

<section class="poem fade">

<p>Tumhari muskaan meri subah hai.</p>

<p>Jab tum "sona" kehti ho, mera din ban jata hai.</p>

<p>I carry your memories in every heartbeat.</p>

<p>Sona, I really miss you.</p>

<p>Dil karta hai tum bas mere saamne ho ❤️</p>

</section>

<section class="gallery fade">

<img src="assets/236D25F6-ADEB-4DCB-9652-1F690A45B22.png">
<img src="assets/36E6AA0B-0408-4CBF-B657-99179BA7ECF2.png">
<img src="assets/3BE2712B-9DF3-49FF-BDAB-4F3393793AD1.png">
<img src="assets/4E71CD17-7744-4647-BC58-F2CB562CEF0D.png">
<img src="assets/5C59197F-AEB3-418C-ADAD-DFDEB0B13209.png">
<img src="assets/5D1C8109-076E-4C5B-923A-9D881A36C6C8.png">
<img src="assets/7E5D5C0A-9251-4065-B68E-654CBD876457.png">
<img src="assets/8C318060-AB2D-4FB3-BDBC-076BEEB0FB33.png">
<img src="assets/941FD73C-BD49-4E10-B329-95BFF2F31804.png">
<img src="assets/A8EEC203-B3FB-4EEB-AA45-6FAEB012B7BA.png">

</section>

<script>

/ HEART CURSOR /

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/ FALLING ROSES */

setInterval(()=>{
const rose=document.createElement("div")

rose.className="rose"
rose.innerHTML="🌹"

rose.style.left=Math.random()*100+"%"
rose.style.animationDuration=4+Math.random()5+"s"

document.body.appendChild(rose)

setTimeout(()=>rose.remove(),9000)

},400)

/ SCROLL REVEAL */

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show")
}
})
})

document.querySelectorAll(".fade").forEach(el=>{
observer.observe(el)
})

</script>

</body>
</html
